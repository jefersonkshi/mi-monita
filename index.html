<script>
// Ajuste directo del contador de tiempo
const fechaInicio = new Date("2023-11-01T00:00:00");

function actualizarContador() {
    const ahora = new Date();
    const diferencia = ahora - fechaInicio;

    // Buscamos el cuadro donde dice "Calculando el tiempo..."
    const elementos = document.getElementsByTagName("p");
    let elementoContador = null;

    for (let el of elementos) {
        if (el.textContent.includes("Calculando el tiempo...") || el.textContent.includes("días")) {
            elementoContador = el;
            break;
        }
    }

    if (!elementoContador) {
        // Si no lo encuentra por texto, busca el contenedor del contador directamente
        const botonContador = document.querySelector('.container, .content, body');
        if (botonContador && !document.getElementById("contador-vivo")) {
            // Un respaldo por si acaso
        }
        return;
    }

    const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
    const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

    elementoContador.innerHTML = `<strong>${dias}</strong> días, <strong>${horas}</strong> horas, <strong>${minutos}</strong> minutos y <strong>${segundos}</strong> segundos`;
}

setInterval(actualizarContador, 1000);
actualizarContador();

// Función del botón corregida en inglés nativo para el celular
function sorpresa() {
    const mensaje = document.getElementById("mensajeFinal");
    const audio = document.getElementById("musica");
    
    // Si hay música, intenta reproducirla sin colgar el botón
    if (audio) {
        audio.play().catch(function(e) { 
            console.log("El navegador del celular bloqueó el auto-play de música."); 
        });
    }
    
    // Muestra el mensaje del regalo al instante
    if (mensaje) {
        mensaje.style.display = "block";
        mensaje.style.visibility = "visible";
        mensaje.scrollIntoView({ behavior: 'smooth' });
    } else {
        alert("¡Feliz cumpleaños, mi monita! 💙");
    }
}
</script>
